services:
  postgres:
    image: postgres:16
    container_name: sistema_epis_postgres
    environment:
      POSTGRES_DB: sistema_epis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sistema_epis_postgres_data:/var/lib/postgresql/data

volumes:
  sistema_epis_postgres_data:
